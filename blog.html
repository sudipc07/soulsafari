  <script type="application/ld+json" id="postSchema">
  {

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf8f3;
    --ink: #1a1a18;
    --muted: #70706a;
    --accent: #6b9f71;
    --accent-dk: #4d7a54;
    --accent-lt: #a8c9ac;
    --sand: #c6b48a;
    --dark: #131a16;
    --line: rgba(107,159,113,0.18);
  }
  html { scroll-behavior: smooth; }
  body {
    background:
      radial-gradient(circle at 12% 5%, rgba(168,201,172,0.24), transparent 34%),
      radial-gradient(circle at 86% 8%, rgba(198,180,138,0.22), transparent 32%),
      var(--cream);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 300;
    line-height: 1.78;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px; opacity: 0.03; pointer-events: none; z-index: 20;
  }
  a { color: inherit; }
  button { font: inherit; }
  .site-header {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    width: min(calc(100% - 32px), 1180px); height: 62px;
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
    padding: 8px 10px 8px 16px;
    background: rgba(250,248,243,0.66);
    border: 1px solid rgba(255,255,255,0.78);
    border-radius: 18px;
    box-shadow: 0 12px 42px rgba(12,20,15,0.13), inset 0 1px 0 rgba(255,255,255,0.76);
    backdrop-filter: blur(26px) saturate(150%);
    -webkit-backdrop-filter: blur(26px) saturate(150%);
    overflow: hidden; z-index: 10;
  }
  .site-brand {
    display: inline-flex; align-items: center; gap: 10px;
    color: var(--ink); text-decoration: none;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.05rem; font-weight: 600; letter-spacing: -0.02em;
  }
  .site-brand img { width: 34px; height: 34px; object-fit: contain; }
  .site-links { display: flex; align-items: center; gap: 8px; }
  .site-links a {
    color: var(--muted); text-decoration: none;
    font-size: .72rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; padding: 10px 14px; border-radius: 999px;
    transition: color .2s, background .2s, transform .2s;
  }
  .site-links a:hover { color: var(--ink); background: rgba(255,255,255,0.38); }
  .mobile-label { display: none; }
  h1, h2, h3 {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 500; line-height: 1.08; letter-spacing: -0.03em;
  }
  .blog-shell {
    width: min(calc(100% - 32px), 1180px);
    margin: 96px auto 80px;
    display: grid;
    grid-template-columns: 340px minmax(0, 1fr);
    gap: 22px;
  }
  .sidebar {
    position: sticky; top: 96px;
    align-self: start;
    max-height: calc(100vh - 116px);
    overflow: auto;
    border: 1px solid rgba(107,159,113,0.16);
    border-radius: 18px;
    background: rgba(255,255,255,0.68);
    box-shadow: 0 22px 64px rgba(27,44,31,0.09);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .sidebar-head {
    padding: 26px 24px 20px;
    color: #f5efe4;
    background: linear-gradient(145deg, rgba(19,26,22,.98), rgba(28,24,16,.98));
  }
  .eyebrow {
    display: block; margin-bottom: 10px;
    color: var(--accent-lt);
    font-size: .72rem; font-weight: 800; letter-spacing: .18em;
    text-transform: uppercase;
  }
  .sidebar-head h1 { margin-bottom: 12px; font-size: 2.1rem; }
  .sidebar-head p { color: rgba(245,239,228,.66); font-size: .92rem; }
  .post-list { display: grid; gap: 8px; padding: 12px; }
  .post-link {
    display: grid; gap: 4px;
    padding: 13px 14px;
    border: 1px solid transparent;
    border-radius: 18px;
    color: var(--ink);
    text-decoration: none;
    transition: background .2s, border-color .2s, transform .2s;
  }
  .post-link:hover, .post-link.active {
    background: white;
    border-color: rgba(107,159,113,0.24);
    transform: translateX(2px);
  }
  .post-link small {
    color: var(--accent-dk);
    font-size: .64rem;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .post-link strong { font-size: .94rem; line-height: 1.32; }
  .post-link span { color: var(--muted); font-size: .78rem; line-height: 1.4; }
  .post {
    border: 1px solid rgba(107,159,113,0.16);
    border-radius: 18px;
    background: rgba(255,255,255,0.72);
    box-shadow: 0 24px 70px rgba(27,44,31,0.10);
    overflow: hidden;
  }
  .post-hero {
    position: relative;
    min-height: clamp(420px, 58vh, 620px);
    display: flex;
    align-items: flex-end;
    padding: clamp(34px, 6vw, 74px);
    color: #f5efe4;
    background:
      radial-gradient(circle at 88% 12%, rgba(168,201,172,0.18), transparent 34%),
      linear-gradient(145deg, rgba(19,26,22,.98), rgba(28,24,16,.98));
    overflow: hidden;
  }
  .post-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(13,18,15,.86), rgba(13,18,15,.46) 46%, rgba(13,18,15,.16)),
      linear-gradient(0deg, rgba(13,18,15,.78), transparent 48%);
    pointer-events: none;
    z-index: 1;
  }
  .post-hero:not(.has-image)::after {
    opacity: 0;
  }
  .post-hero-image {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 0;
    background: #131a16;
  }
  .post-hero.has-image .post-hero-image { display: block; }
  .post-hero-image img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  .post-hero-copy {
    position: relative;
    z-index: 2;
    width: min(520px, 48%);
  }
  .word {
    display: inline-flex; align-items: baseline; gap: 12px;
    margin-bottom: 22px;
    color: var(--accent-lt);
    font-size: .85rem; font-weight: 700; letter-spacing: .16em;
    text-transform: uppercase;
  }
  .word strong {
    font-family: 'Playfair Display', Georgia, serif;
    color: #f5efe4;
    font-size: 2.4rem;
    letter-spacing: 0;
    text-transform: none;
  }
  .post-hero h2 {
    margin-bottom: 22px;
    font-size: clamp(2.25rem, 4.8vw, 4.2rem);
    text-wrap: balance;
  }
  .tagline {
    max-width: 680px;
    color: rgba(245,239,228,.68);
    font-size: 1.12rem;
  }
  .post-meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 26px;
  }
  .post-meta span {
    padding: 7px 11px;
    border-radius: 999px;
    color: rgba(245,239,228,.78);
    background: rgba(255,255,255,.08);
    font-size: .73rem;
    font-weight: 700;
    letter-spacing: .05em;
  }
  .article {
    padding: clamp(30px, 6vw, 76px);
  }
  .article-content {
    max-width: 760px;
    margin: 0 auto;
  }
  .article-content p {
    margin: 0 0 1.35em;
    color: #55554f;
    font-size: 1.08rem;
  }
  .article-content p:first-child {
    color: var(--ink);
    font-size: 1.22rem;
    line-height: 1.7;
  }
  .article-content h2 {
    margin: 2.1em 0 .72em;
    color: var(--ink);
    font-size: clamp(2rem, 4vw, 3rem);
  }
  .article-content em { color: var(--accent-dk); }
  .article-actions {
    max-width: 760px;
    margin: 44px auto 0;
    padding-top: 26px;
    border-top: 1px solid var(--line);
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .button {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 44px; padding: 12px 20px;
    border-radius: 999px;
    border: 1px solid rgba(107,159,113,0.28);
    color: var(--accent-dk);
    background: rgba(255,255,255,0.62);
    text-decoration: none;
    font-size: .82rem; font-weight: 700; letter-spacing: .06em;
  }
  .button.primary { color: white; background: var(--accent-dk); border-color: var(--accent-dk); }
  @media (max-width: 860px) {
    .site-header { top: 10px; width: calc(100% - 20px); height: 58px; padding: 8px 9px 8px 12px; }
    .site-brand span { display: none; }
    .site-links { gap: 6px; }
    .site-links a { padding: 9px 10px; font-size: .66rem; letter-spacing: .06em; }
    .desktop-label { display: none; }
    .mobile-label { display: inline; }
    .blog-shell {
      width: calc(100% - 20px);
      margin-top: 82px;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .sidebar {
      position: relative; top: auto; max-height: none;
      border-radius: 18px;
    }
    .sidebar-head { padding: 22px 20px 18px; }
    .sidebar-head h1 { font-size: 1.9rem; }
    .post-list {
      grid-auto-flow: column;
      grid-auto-columns: minmax(230px, 80vw);
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
    }
    .post-link { scroll-snap-align: start; }
    .post { border-radius: 18px; }
    .post-hero {
      min-height: 520px;
      padding: 28px 22px;
      align-items: flex-end;
    }
    .post-hero::after {
      background:
        linear-gradient(0deg, rgba(13,18,15,.88), rgba(13,18,15,.38) 58%, rgba(13,18,15,.06)),
        linear-gradient(90deg, rgba(13,18,15,.36), rgba(13,18,15,.08));
    }
    .post-hero h2 { font-size: clamp(2.1rem, 10vw, 3.4rem); }
    .post-hero-copy {
      width: min(78vw, 420px);
    }
    .article-content p { font-size: 1rem; }
    .article-actions { flex-direction: column; }
    .button { width: 100%; }
  }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="site-brand" href="index.html" aria-label="SoulSafari home">
      <img src="assets/soulsafari-logo.png" alt="" aria-hidden="true" />
      <span>SoulSafari</span>
    </a>
    <nav class="site-links" aria-label="Primary navigation">
      <a href="learn.html">Learn</a>
      <a href="blog.html">Blog</a>
      <a href="quiz.html">Quiz</a>
    </nav>
  </header>

  <main class="blog-shell">
    <aside class="sidebar" id="posts">
      <section class="sidebar-head">
        <span class="eyebrow">SoulSafari Essays</span>
        <h1>Field notes for the interior.</h1>
        <p>Long-form reflections behind the lessons.</p>
      </section>
      <nav class="post-list" id="postList" aria-label="Essay list"></nav>
    </aside>

    <article class="post">
      <header class="post-hero" id="postHero">
        <div class="post-hero-image" id="postImageWrap">
          <img id="postImage" src="" alt="" />
        </div>
        <div class="post-hero-copy">
          <div class="word"><strong id="postWord">चमत्कार</strong><span id="postTranslit">chamatkār</span></div>
          <h2 id="postTitle">Loading essay…</h2>
          <p class="tagline" id="postTagline"></p>
          <div class="post-meta">
            <span id="postStatus">SoulSafari Essay</span>
            <span id="postReadingTime">Read</span>
          </div>
        </div>
      </header>
      <section class="article">
        <div class="article-content" id="postBody"></div>
        <div class="article-actions">
          <a class="button primary" href="learn.html">Continue Learn Safari</a>
          <a class="button" href="quiz.html">Take the quiz</a>
        </div>
      </section>
    </article>
  </main>

  <script src="assets/essays-data.js"></script>
  <script>
  const posts = (window.SOULSAFARI_ESSAYS || []).slice().sort((a, b) => a.order - b.order);
  const postImages = {
    chamatkar: 'assets/blog/chamatkar.png',
    karma: 'assets/blog/karma.png',
    vairagya: 'assets/blog/vairagya.png',
    chanchala: 'assets/blog/chanchala.png',
    svadharma: 'assets/blog/svadharma.png',
    kshama: 'assets/blog/kshama.png',
    purna: 'assets/blog/purna.png',
    abhaya: 'assets/blog/abhaya.png',
    trishna: 'assets/blog/trishna.png',
    sakshi: 'assets/blog/sakshi.png'
  };

  function $(id) { return document.getElementById(id); }
  function escapeHtml(value = '') {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
  function markdownToHtml(markdown = '') {
    const body = markdown.replace(/^---[\s\S]*?---\s*/, '').replace(/^# .+\n+/, '');
    const blocks = body.split(/\n\s*\n/).map((block) => block.trim()).filter(Boolean);
    return blocks.map((block) => {
      if (block.startsWith('## ')) return `<h2>${escapeHtml(block.slice(3))}</h2>`;
      const text = escapeHtml(block).replace(/\n/g, '<br />');
      return `<p>${text}</p>`;
    }).join('\n');
  }
  function postUrl(slug) {
    return `${location.pathname}?post=${encodeURIComponent(slug)}`;
  }
  function absolutePostUrl(slug) {
    return `https://soulsafari.in/blog.html?post=${encodeURIComponent(slug)}`;
  }
  function absoluteImageUrl(slug) {
    return `https://soulsafari.in/assets/blog/${encodeURIComponent(slug)}.png`;
  }
  function setMeta(selector, attr, value) {
    const el = document.querySelector(selector);
    if (el) el.setAttribute(attr, value);
  }
  function updateSeo(post) {
    const title = `${post.title} — SoulSafari Essays`;
    const description = post.excerpt || post.tagline || 'A SoulSafari essay.';
    const image = postImages[post.slug] ? absoluteImageUrl(post.slug) : 'https://soulsafari.in/assets/soulsafari-og.png';
    document.title = title;
    setMeta('meta[name="description"]', 'content', description);
    setMeta('meta[property="og:title"]', 'content', title);
    setMeta('meta[property="og:description"]', 'content', description);
    setMeta('meta[property="og:type"]', 'content', 'article');
    setMeta('meta[property="og:url"]', 'content', absolutePostUrl(post.slug));
    setMeta('meta[property="og:image"]', 'content', image);
    setMeta('meta[property="og:image:secure_url"]', 'content', image);
    setMeta('meta[name="twitter:title"]', 'content', title);
    setMeta('meta[name="twitter:description"]', 'content', description);
    setMeta('meta[name="twitter:image"]', 'content', image);
    document.querySelector('link[rel="canonical"]')?.setAttribute('href', absolutePostUrl(post.slug));
    $('postSchema').textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'BlogPosting',
      headline: post.title,
      description,
      url: absolutePostUrl(post.slug),
      image,
      isPartOf: { '@type': 'Blog', name: 'SoulSafari Essays', url: 'https://soulsafari.in/blog.html' },
      author: { '@type': 'Organization', name: 'SoulSafari' },
      publisher: { '@type': 'Organization', name: 'SoulSafari' },
      inLanguage: 'en'
    });
  }
  function renderList() {
    $('postList').innerHTML = posts.map((post) => `
      <a class="post-link" href="${postUrl(post.slug)}" data-slug="${escapeHtml(post.slug)}">
        <small>${String(post.order).padStart(2, '0')} · ${escapeHtml(post.word_transliteration)}</small>
        <strong>${escapeHtml(post.title)}</strong>
        <span>${escapeHtml(post.tagline)}</span>
      </a>
    `).join('');
    document.querySelectorAll('.post-link').forEach((link) => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        const slug = link.dataset.slug;
        history.pushState({ slug }, '', postUrl(slug));
        renderPost(slug);
      });
    });
  }
  function renderPost(slug) {
    const post = posts.find((item) => item.slug === slug) || posts[0];
    if (!post) return;
    $('postWord').textContent = post.word_devanagari;
    $('postTranslit').textContent = post.word_transliteration;
    $('postTitle').textContent = post.title;
    $('postTagline').textContent = post.tagline;
    $('postStatus').textContent = 'SoulSafari Essay';
    $('postReadingTime').textContent = `${post.reading_time} min read`;
    $('postBody').innerHTML = markdownToHtml(post.body);
    const image = postImages[post.slug];
    $('postHero').classList.toggle('has-image', Boolean(image));
    if (image) {
      $('postImage').src = image;
      $('postImage').alt = `${post.title} — SoulSafari essay artwork`;
    } else {
      $('postImage').removeAttribute('src');
      $('postImage').alt = '';
    }
    document.querySelectorAll('.post-link').forEach((link) => {
      link.classList.toggle('active', link.dataset.slug === post.slug);
    });
    updateSeo(post);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function currentSlug() {
    return new URLSearchParams(location.search).get('post') || posts[0]?.slug;
  }
  window.addEventListener('popstate', () => renderPost(currentSlug()));
  renderList();
  const initialSlug = currentSlug();
  if (!new URLSearchParams(location.search).get('post') && initialSlug) {
    history.replaceState({ slug: initialSlug }, '', postUrl(initialSlug));
  }
  renderPost(initialSlug);
  </script>
</body>
